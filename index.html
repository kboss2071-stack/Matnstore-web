<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matn Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* Header */
.header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* Hero */
.hero {
    padding: 30px 20px;
    text-align: center;
}

.hero h1 {
    margin-bottom: 10px;
}

.hero p {
    color: #555;
}

/* Products */
.products {
    padding: 20px;
}

.product {
    background: white;
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    max-width: 250px;
}

.price {
    color: red;
    font-weight: bold;
    margin: 10px 0;
}

/* Button */
.btn {
    display: block;
    background: #25D366;
    color: white;
    padding: 12px;
    text-decoration: none;
    border-radius: 8px;
}

/* Footer */
.footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #777;
}
</style>

</head>

<body>

<div class="header">
Matn Store
</div>

<div class="hero">
<h1>مرحبا بك في متجر متن</h1>
<p>أفضل المنتجات بأثمنة مناسبة وجودة عالية</p>
</div>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>فرشاة تصفيف الشعر 5 في 1</h3>
<div class="price">299 درهم</div>
<a class="btn" href="https://wa.me/212XXXXXXXXX?text=بغيت نطلب فرشاة الشعر">
اطلب الآن
</a>
</div>

<div class="product">
<img src="https://via.placeholder.com/250">
<h3>منتج آخر</h3>
<div class="price">199 درهم</div>
<a class="btn" href="https://wa.me/212XXXXXXXXX">
اطلب الآن
</a>
</div>

</div>

<div class="footer">
© 2026 Matn Store
</div>

</body>
</html>
