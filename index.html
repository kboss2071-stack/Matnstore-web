<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matn Store</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f2f2f2;
    text-align: center;
}

.container {
    padding: 20px;
}

.product-img {
    width: 100%;
    max-width: 320px;
    border-radius: 10px;
}

h1 {
    font-size: 22px;
    color: #111;
}

.desc {
    color: #555;
    margin: 15px 0;
    line-height: 1.6;
}

.price {
    font-size: 26px;
    color: #e60023;
    font-weight: bold;
    margin: 10px 0;
}

.old-price {
    text-decoration: line-through;
    color: #999;
    font-size: 16px;
}

.btn {
    display: block;
    background: #25D366;
    color: white;
    padding: 15px;
    margin-top: 20px;
    text-decoration: none;
    font-size: 18px;
    border-radius: 8px;
}

.features {
    text-align: right;
    margin-top: 20px;
}

.features li {
    margin-bottom: 8px;
}
</style>

</head>

<body>

<div class="container">

<h1>فرشاة تصفيف الشعر 5 في 1</h1>

<img class="product-img" src="https://via.placeholder.com/300">

<p class="desc">
جففي وسرحي شعرك في نفس الوقت بسهولة.  
نتيجة احترافية في دقائق بدون الحاجة لصالون.
</p>

<div class="old-price">399 درهم</div>
<div class="price">299 درهم فقط</div>

<ul class="features">
<li>✔️ تسريح + تجفيف في نفس الوقت</li>
<li>✔️ مناسبة لجميع أنواع الشعر</li>
<li>✔️ سهلة الاستعمال</li>
<li>✔️ نتائج سريعة وفعالة</li>
</ul>

<a class="btn" href="https://wa.me/212632300445">
اطلب الآن عبر واتساب
</a>

</div>

</body>
</html>
